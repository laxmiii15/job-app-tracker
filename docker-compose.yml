services:
  postgres:
    image: postgres:16-alpine
    container_name: job_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_tracker
    ports:
      - '5432:5432'
    volumes:
      - job_tracker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d job_tracker']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  job_tracker_pgdata:
